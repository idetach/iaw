services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: metrics_margin_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "5434:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro

  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    container_name: metrics_margin_collector
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
    volumes:
      - ./collector/app:/app/app:ro
      - ./sql:/app/sql:ro

  grafana:
    image: grafana/grafana-oss:11.2.0
    container_name: metrics_margin_grafana
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-polystat-panel
      TG_BOT_TOKEN: ${TG_IAW_METRICS_ALERTS_BOT_TOKEN}
      TG_CHAT_ID: ${TG_IAW_METRICS_ALERTS_BOT_CHAT_ID}
    entrypoint: ["/bin/sh", "/opt/entrypoint.sh"]
    ports:
      - "3005:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/opt/provisioning-tpl:ro
      - ./grafana/entrypoint.sh:/opt/entrypoint.sh:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  timescaledb_data:
  grafana_data:
